; SilentSDDM matugen theme
; https://github.com/uiriansan/SilentSDDM/wiki/Customizing

[General]
scale = 1.0
enable-animations = true
animated-background-placeholder = ""
background-fill-mode = "fill"

[LockScreen]
display = true
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = ""
use-background-color = true
background-color = "#{{colors.surface.default.hex_stripped}}"
blur = 0
brightness = 0.0
saturation = 0.0

[LockScreen.Clock]
display = true
position = "center"
align = "center"
format = "hh:mm"
font-family = "RedHatDisplay"
font-size = 70
font-weight = 900
color = "#{{colors.on_surface.default.hex_stripped}}"

[LockScreen.Date]
display = true
format = "dddd, MMMM dd, yyyy"
locale = "en_US"
font-family = "RedHatDisplay"
font-size = 14
font-weight = 600
color = "#{{colors.on_surface_variant.default.hex_stripped}}"
margin-top = -15

[LockScreen.Message]
display = true
position = "bottom-center"
align = "center"
text = "Press any key"
font-family = "RedHatDisplay"
font-size = 12
font-weight = 400
icon = "catppuccin.png"
icon-size = 16
color = "#{{colors.on_surface_variant.default.hex_stripped}}"
paint-icon = false
spacing = 0

[LoginScreen]
background = ""
use-background-color = true
background-color = "#{{colors.surface.default.hex_stripped}}"
blur = 0
brightness = 0.0
saturation = 0.0

[LoginScreen.LoginArea]
position = "center"
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = "circle"
border-radius = 35
active-size = 120
inactive-size = 80
inactive-opacity = 0.35
active-border-size = 0
inactive-border-size = 0
active-border-color = "#{{colors.primary.default.hex_stripped}}"
inactive-border-color = "#{{colors.primary.default.hex_stripped}}"

[LoginScreen.LoginArea.Username]
font-family = "RedHatDisplay"
font-size = 16
font-weight = 700
color = "#{{colors.on_surface.default.hex_stripped}}"
margin = 10

[LoginScreen.LoginArea.PasswordInput]
width = 200
height = 30
font-family = "RedHatDisplay"
font-size = 12
content-color = "#{{colors.on_surface.default.hex_stripped}}"
background-color = "#{{colors.surface_container.default.hex_stripped}}"
background-opacity = 1.0
border-size = 0
border-radius-left = 10
border-radius-right = 10
margin-top = 10
masked-character = "●"

[LoginScreen.LoginArea.LoginButton]
background-color = "#{{colors.primary.default.hex_stripped}}"
active-background-color = "#{{colors.primary_container.default.hex_stripped}}"
content-color = "#{{colors.on_primary.default.hex_stripped}}"
active-content-color = "#{{colors.on_primary_container.default.hex_stripped}}"
border-size = 0
border-radius-left = 10
border-radius-right = 10
margin-left = 5

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Logging in"
font-family = "RedHatDisplay"
font-weight = 600
font-size = 14
icon-size = 30
color = "#{{colors.on_surface.default.hex_stripped}}"
spacing = 5

[LoginScreen.LoginArea.WarningMessage]
font-family = "RedHatDisplay"
font-size = 11
font-weight = 400
normal-color = "#{{colors.on_surface.default.hex_stripped}}"
warning-color = "#{{colors.tertiary.default.hex_stripped}}"
error-color = "#{{colors.error.default.hex_stripped}}"
margin-top = 10

[LoginScreen.MenuArea.Buttons]
margin-top = 0
margin-right = 0
margin-bottom = 100
margin-left = 0
size = 30
border-radius = 10
spacing = 20
font-family = "RedHatDisplay"

[LoginScreen.MenuArea.Popups]
max-height = 230
item-height = 30
item-spacing = 2
padding = 5
margin = 5
background-color = "#{{colors.surface_container.default.hex_stripped}}"
background-opacity = 1.0
active-option-background-color = "#{{colors.surface_container_high.default.hex_stripped}}"
active-option-background-opacity = 1.0
content-color = "#{{colors.on_surface.default.hex_stripped}}"
active-content-color = "#{{colors.primary.default.hex_stripped}}"
font-family = "RedHatDisplay"
border-size = 0
font-size = 11
icon-size = 16

[LoginScreen.MenuArea.Session]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
display-session-name = false
popup-width = 200
background-color = "#{{colors.primary_container.default.hex_stripped}}"
active-background-color = "#{{colors.primary.default.hex_stripped}}"
content-color = "#{{colors.on_primary_container.default.hex_stripped}}"
active-content-color = "#{{colors.on_primary.default.hex_stripped}}"
border-size = 0
font-size = 10
icon-size = 16

[LoginScreen.MenuArea.Layout]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 180
display-layout-name = false
background-color = "#{{colors.primary_container.default.hex_stripped}}"
active-background-color = "#{{colors.primary.default.hex_stripped}}"
content-color = "#{{colors.on_primary_container.default.hex_stripped}}"
active-content-color = "#{{colors.on_primary.default.hex_stripped}}"
border-size = 0
font-size = 10
icon-size = 16

[LoginScreen.MenuArea.Keyboard]
display = true
position = "bottom-center"
index = 0
background-color = "#{{colors.primary_container.default.hex_stripped}}"
active-background-color = "#{{colors.primary.default.hex_stripped}}"
content-color = "#{{colors.on_primary_container.default.hex_stripped}}"
active-content-color = "#{{colors.on_primary.default.hex_stripped}}"
border-size = 0
icon-size = 16

[LoginScreen.MenuArea.Power]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 100
background-color = "#{{colors.primary_container.default.hex_stripped}}"
active-background-color = "#{{colors.primary.default.hex_stripped}}"
content-color = "#{{colors.on_primary_container.default.hex_stripped}}"
active-content-color = "#{{colors.on_primary.default.hex_stripped}}"
border-size = 0
icon-size = 16

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = "login"
start-hidden = true
background-color = "#{{colors.surface_container.default.hex_stripped}}"
background-opacity = 0.15
key-content-color = "#{{colors.on_surface.default.hex_stripped}}"
key-color = "#{{colors.surface_container.default.hex_stripped}}"
key-opacity = 1.0
key-active-background-color = "#{{colors.surface_container_high.default.hex_stripped}}"
key-active-opacity = 1.0
selection-background-color = "#{{colors.primary.default.hex_stripped}}"
selection-content-color = "#{{colors.on_primary.default.hex_stripped}}"
primary-color = "#{{colors.primary.default.hex_stripped}}"
border-size = 0

[Tooltips]
enable = true
font-family = "RedHatDisplay"
font-size = 11
content-color = "#{{colors.on_surface.default.hex_stripped}}"
background-color = "#{{colors.surface_container.default.hex_stripped}}"
background-opacity = 1.0
border-radius = 10
