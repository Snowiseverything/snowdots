########################################################################
##  SnowDots - Hypridle Config                                         ##
########################################################################

general {
    lock_cmd = loginctl lock-session             # caelestia handles the lock UI
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on display after sleep
}

# ── PROGRESSIVE NIGHT LIGHT ──

# Evening (7 PM): Start warming up
listener {
    timeout = 60                                # checks every minute
    on-timeout = [ "$(date +%H)" -ge 19 ] && hyprsunset --temperature 4500
}

# Late Night (10 PM): Get yellower
listener {
    timeout = 60
    on-timeout = [ "$(date +%H)" -ge 22 ] && hyprsunset --temperature 3000
}

# Morning (7 AM): Reset to daylight
listener {
    timeout = 60
    on-timeout = [ "$(date +%H)" -ge 07 ] && [ "$(date +%H)" -lt 19 ] && pkill hyprsunset
}
