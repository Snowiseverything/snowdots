[General]
scale = 1.0
enable-animations = false
background-fill-mode = "fill"

[LockScreen]
display = true
background = "backgrounds/current.jpg"
use-background-color = false
blur = 20

[LockScreen.Clock]
display = false

[LockScreen.Date]
display = false

[LockScreen.Message]
display = false

[LoginScreen]
background = "backgrounds/current.jpg"
use-background-color = false
blur = 15
brightness = 0.3
saturation = 0.0

[LoginScreen.LoginArea]
position = "center"

[LoginScreen.LoginArea.Avatar]
active-size = 80
inactive-size = 0
inactive-opacity = 0
active-border-size = 0

[LoginScreen.LoginArea.Username]
display = false

[LoginScreen.LoginArea.PasswordInput]
width = 220
height = 36
font-size = 14
content-color = "#ffffff"
background-color = "#000000"
background-opacity = 0.25
border-size = 1
border-color = "#ffffff"
border-opacity = 0.15
border-radius-left = 12
border-radius-right = 12
margin-top = 0
masked-character = "●"

[LoginScreen.LoginArea.LoginButton]
background-color = "#ffffff"
background-opacity = 0.0
active-background-color = "#ffffff"
active-background-opacity = 0.15
content-color = "#ffffff"
active-content-color = "#ffffff"
border-size = 0
margin-left = 0
show-text-if-no-password = false
hide-if-not-needed = true

[LoginScreen.MenuArea.Buttons]
margin-bottom = 40
size = 24
spacing = 16

[LoginScreen.MenuArea.Session]
display = true
position = "bottom-center"
display-session-name = false
button-width = -1
popup-width = 180
background-opacity = 0.0
active-background-opacity = 0.15
content-color = "#ffffff"
active-content-color = "#ffffff"
font-size = 11
icon-size = 14

[LoginScreen.MenuArea.Layout]
display = false

[LoginScreen.MenuArea.Keyboard]
display = false

[LoginScreen.MenuArea.Power]
display = true
position = "bottom-center"
popup-width = 100
background-opacity = 0.0
active-background-opacity = 0.15
content-color = "#ffffff"
active-content-color = "#ffffff"
icon-size = 14

[LoginScreen.MenuArea.Popups]
background-color = "#000000"
background-opacity = 0.4
content-color = "#ffffff"
active-content-color = "#ffffff"
font-size = 11
border-radius = 8
